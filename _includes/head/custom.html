<!-- start custom head snippets -->

{% include base_path %}

<!-- Canonical (helps avoid duplicate indexing across domain / github.io / trailing slash variants) -->
<link rel="canonical" href="{{ page.url | absolute_url }}"/>

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Favicons -->
<link rel="icon" href="{{ '/favicon.ico' | absolute_url }}" sizes="any">
<link rel="shortcut icon" href="{{ '/favicon.ico' | absolute_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" sizes="32x32" href="{{ base_path }}/images/favicon-32x32.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="{{ base_path }}/images/favicon-192x192.png"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Allow indexing (default is already indexable, but explicit doesn't hurt) -->
<meta name="robots" content="index,follow"/>

<!-- Structured data for Google: identify the site as your personal profile -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfilePage",
  "url": "{{ page.url | absolute_url }}",
  "mainEntity": {
    "@type": "Person",
    "name": "Francesco A.B. Silva",
    "givenName": "Francesco",
    "additionalName": "Attilio Bruno",
    "familyName": "Silva",
    "alternateName": [
      "Francesco Silva",
      "Francesco A. B. Silva",
      "Francesco Attilio Bruno Silva"
    ],
    "url": "{{ '/' | absolute_url }}",
    "image": "{{ '/images/profile.png' | absolute_url }}",
    "jobTitle": "Postdoctoral Researcher",
    "affiliation": {
      "@type": "Organization",
      "name": "Texas A&M University"
    },
    "sameAs": [
      "https://orcid.org/0000-0002-1741-9356",
      "https://scholar.google.com/citations?user=sUMfckYAAAAJ&hl=it",
      "https://github.com/FrancescoSilva"
    ]
  }
}
</script>

<!-- end custom head snippets -->
